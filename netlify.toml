[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "0"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://*.supabase.co https://places.googleapis.com https://maps.googleapis.com;"

# netlify.toml
[build]
  command = "npm run build"
  publish  = ".next"         # Netlify copies everything in here

[[plugins]]
  package = "@netlify/plugin-nextjs"   # handles SSR, image optimisation, routing, etc.

[build.environment]
  NODE_VERSION = "18"

